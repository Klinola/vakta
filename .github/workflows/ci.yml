name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Test
        run: CGO_ENABLED=0 go test ./cmd/... ./internal/...

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: cd web && npm ci

      - name: Type check
        run: cd web && ./node_modules/.bin/tsc --noEmit

      - name: Build
        run: cd web && ./node_modules/.bin/vite build
