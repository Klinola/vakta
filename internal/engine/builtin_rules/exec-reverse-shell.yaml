rules:
  - id: exec-bash-tcp-redirect
    name: Shell spawned with /dev/tcp redirect (bash reverse shell)
    severity: critical
    source: ebpf
    event_type: EXEC
    condition: >
      detail.filename.matches(".*(bash|sh|zsh|dash|ksh|csh|tcsh)$") &&
      detail.argv.exists(a, a.contains("/dev/tcp/") || a.contains("/dev/udp/"))
    tags: [execution, command-control, reverse-shell, T1059.004]

  - id: exec-nc-reverse-shell
    name: Netcat launched with exec flag (reverse shell)
    severity: critical
    source: ebpf
    event_type: EXEC
    condition: >
      detail.filename.matches(".*(nc|ncat|netcat|socat)$") &&
      (detail.argv.exists(a, a == "-e") || detail.argv.exists(a, a == "-c") ||
       detail.argv.exists(a, a.contains("/bin/sh")) || detail.argv.exists(a, a.contains("/bin/bash")))
    tags: [execution, command-control, reverse-shell, T1059]

  - id: exec-python-reverse-shell
    name: Python/Perl/Ruby interpreter spawning socket reverse shell
    severity: high
    source: ebpf
    event_type: EXEC
    condition: >
      detail.filename.matches(".*(python[0-9.]*|perl[0-9.]*|ruby[0-9.]*|php[0-9.]*)$") &&
      (detail.argv.exists(a, a == "-e") || detail.argv.exists(a, a == "-c") || detail.argv.exists(a, a == "-r")) &&
      detail.argv.exists(a, a.contains("socket") || a.contains("subprocess") || a.contains("exec") || a.contains("popen"))
    tags: [execution, command-control, reverse-shell, T1059]
