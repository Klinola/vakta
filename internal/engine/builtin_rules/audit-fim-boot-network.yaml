rules:
  - id: fim-bootloader-modified
    name: Bootloader configuration modified (potential persistent implant)
    severity: critical
    source: auditd
    event_type: AUDIT_FIM
    condition: >
      detail.path.matches("^/boot/") ||
      detail.path.matches("^/etc/grub\\.d/") ||
      detail.path == "/etc/default/grub"
    tags: [persistence, T1542.003]

  - id: fim-hosts-file-modified
    name: /etc/hosts modified (DNS redirect or C2 domain override)
    severity: high
    source: auditd
    event_type: AUDIT_FIM
    condition: detail.path == "/etc/hosts"
    tags: [defense-evasion, command-control, T1565.001]

  - id: fim-resolv-conf-modified
    name: DNS resolver configuration modified
    severity: high
    source: auditd
    event_type: AUDIT_FIM
    condition: detail.path == "/etc/resolv.conf"
    tags: [defense-evasion, command-control, T1565.001]

  - id: fim-pam-modified
    name: PAM configuration modified (authentication bypass)
    severity: critical
    source: auditd
    event_type: AUDIT_FIM
    condition: >
      detail.path.matches("^/etc/pam\\.d/") ||
      detail.path.matches("^/etc/security/") ||
      detail.path.matches("^/lib/security/") ||
      detail.path.matches("^/lib64/security/")
    tags: [persistence, credential-access, T1556.003]
