rules:
  - id: sgid-bit-set
    name: SGID bit set on file
    severity: high
    source: ebpf
    event_type: CHMOD
    # Package managers (system) and k8s kubelet/k3s-agent set SGID on projected SA token
    # volumes as part of normal pod lifecycle — exclude both by comm.
    condition: >
      detail.sgid == true &&
      !event.comm.matches("^(dpkg|apt|apt-get|apk|rpm|yum|dnf|pacman|zypper|emerge|portage|kubelet|k3s-agent|k3s-server|k3s)$")
    tags: [persistence, privilege-escalation, T1548.001]

  - id: chmod-world-writable-sensitive
    name: World-writable permission set on sensitive path
    severity: high
    source: ebpf
    event_type: CHMOD
    condition: >
      detail.mode % 8 >= 2 &&
      (detail.path.matches("^/etc/") || detail.path.matches("^/usr/") ||
       detail.path.matches("^/bin/") || detail.path.matches("^/sbin/"))
    tags: [defense-evasion, persistence, T1222]
