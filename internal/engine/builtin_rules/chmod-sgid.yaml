rules:
  - id: sgid-bit-set
    name: SGID bit set on file
    severity: high
    source: ebpf
    event_type: CHMOD
    # Package managers (system) and k8s kubelet/k3s-agent set SGID on projected SA token
    # volumes as part of normal pod lifecycle — exclude both by comm.
    # chmod comm excluded: the chmod tool itself is used by init scripts (e.g. postgres init
    # sets SGID on /var/run/postgresql); the tool is the expected actor for permission changes.
    # Suspicious SGID is a service binary calling chmod(2) directly — comm won't be "chmod".
    condition: >
      detail.sgid == true &&
      !event.comm.matches("^(dpkg|apt|apt-get|apk|rpm|yum|dnf|pacman|zypper|emerge|portage|kubelet|k3s-agent|k3s-server|k3s|containerd|runc|dockerd|chmod)$")
    tags: [persistence, privilege-escalation, T1548.001]

  - id: chmod-world-writable-sensitive
    name: World-writable permission set on sensitive path
    severity: high
    source: ebpf
    event_type: CHMOD
    # mode % 4 >= 2 correctly isolates the world-write bit (bit 1 of the "other" 3-bit group):
    #   mode % 8 gives the 3 world bits (rwx); within those, % 4 drops the execute bit and >= 2
    #   checks if write is set. The old condition (% 8 >= 2) incorrectly fired on world-read-only
    #   files (mode=0644 → world_bits=4 → 4 >= 2 = true, but write bit is NOT set).
    # ldconfig/ldconfig.real excluded: apt/dpkg package installation runs ldconfig to rebuild
    #   /etc/ld.so.cache; it creates a temp file and fchmod(0644) → triggers the old buggy rule.
    #   After the % 4 fix this exclusion is belt-and-suspenders; kept for clarity.
    condition: >
      detail.mode % 4 >= 2 &&
      (detail.path.matches("^/etc/") || detail.path.matches("^/usr/") ||
       detail.path.matches("^/bin/") || detail.path.matches("^/sbin/")) &&
      !event.comm.matches("^(ldconfig|ldconfig\\.real)$")
    tags: [defense-evasion, persistence, T1222]
