rules:
  - id: exec-from-tmpdir
    name: Execution from writable temp directory
    severity: high
    source: ebpf
    event_type: EXEC
    condition: >
      detail.filename.matches("^/tmp/") ||
      detail.filename.matches("^/dev/shm/") ||
      detail.filename.matches("^/var/tmp/") ||
      detail.filename.matches("^/run/shm/")
    tags: [execution, defense-evasion, T1059]

  - id: exec-from-proc-mem
    name: Execution from /proc (memfd-backed path)
    severity: critical
    source: ebpf
    event_type: EXEC
    condition: detail.filename.matches("^/proc/") && detail.filename.contains("/fd/")
    tags: [execution, defense-evasion, fileless, T1620]
