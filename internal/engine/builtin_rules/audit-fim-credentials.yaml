rules:
  - id: fim-passwd-modified
    name: /etc/passwd modified (potential backdoor account)
    severity: critical
    source: auditd
    event_type: AUDIT_FIM
    condition: detail.path == "/etc/passwd"
    tags: [persistence, privilege-escalation, T1136.001]

  - id: fim-shadow-modified
    name: /etc/shadow modified (password hash tampered)
    severity: critical
    source: auditd
    event_type: AUDIT_FIM
    condition: detail.path == "/etc/shadow" || detail.path == "/etc/gshadow"
    tags: [credential-access, T1003.008]

  - id: fim-group-modified
    name: /etc/group modified (group membership manipulation)
    severity: high
    source: auditd
    event_type: AUDIT_FIM
    condition: detail.path == "/etc/group" || detail.path == "/etc/gshadow"
    tags: [persistence, privilege-escalation, T1098]
