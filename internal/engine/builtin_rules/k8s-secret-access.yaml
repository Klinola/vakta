rules:
  - id: k8s-secret-bulk-list
    name: Kubernetes secrets bulk-listed via API
    severity: critical
    source: k8s_audit
    event_type: K8S_SECRET_ACCESS
    # Exclude known infra SAs: ArgoCD reads all secrets for repo/app configs on sync;
    # kube-system controllers need secrets for TLS and service account tokens.
    # Add your own app-namespace SA here if a legitimate operator needs to list secrets.
    condition: >
      detail.verb == "list" &&
      !detail.username.matches("^system:serviceaccount:kube-system:") &&
      !detail.username.matches("^system:serviceaccount:argocd:") &&
      !detail.username.matches("^system:serviceaccount:cert-manager:") &&
      !detail.username.matches("^system:serviceaccount:[^:]+:kube-state-metrics$") &&
      !detail.username.matches("^system:(admin|kube-)")
    tags: [credential-access, collection, T1552.007]

  - id: k8s-secret-get
    name: Kubernetes secret accessed via API
    severity: high
    source: k8s_audit
    event_type: K8S_SECRET_ACCESS
    # system:admin / system:kube-* are k3s built-in cluster admin users, not service accounts;
    # exclude them to avoid alerting on legitimate operator kubectl activity.
    condition: >
      detail.verb == "get" &&
      !detail.username.matches("^system:serviceaccount:kube-system:") &&
      !detail.username.matches("^system:serviceaccount:argocd:") &&
      !detail.username.matches("^system:serviceaccount:cert-manager:") &&
      !detail.username.matches("^system:serviceaccount:[^:]+:kube-state-metrics$") &&
      !detail.username.matches("^system:(admin|kube-)")
    tags: [credential-access, T1552.007]
