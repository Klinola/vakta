rules:
  - id: k8s-clusterrolebinding-create
    name: ClusterRoleBinding created or modified (privilege escalation)
    severity: critical
    source: k8s_audit
    event_type: K8S_AUDIT
    # ArgoCD application-controller patches managed RBAC on every sync cycle — exclude it.
    condition: >
      detail.resource == "clusterrolebindings" &&
      detail.verb in ["create", "update", "patch"] &&
      !detail.username.matches("^system:serviceaccount:argocd:")
    tags: [privilege-escalation, persistence, T1078.001]

  - id: k8s-rolebinding-admin
    name: RoleBinding granting cluster-admin or high-privilege role
    severity: high
    source: k8s_audit
    event_type: K8S_AUDIT
    condition: >
      detail.resource == "rolebindings" &&
      detail.verb in ["create", "update", "patch"] &&
      detail.name.contains("admin")
    tags: [privilege-escalation, persistence, T1078.001]

  - id: k8s-clusterrole-create
    name: ClusterRole created or modified
    severity: warning
    source: k8s_audit
    event_type: K8S_AUDIT
    condition: >
      detail.resource == "clusterroles" &&
      detail.verb in ["create", "update", "patch"] &&
      !detail.username.matches("^system:serviceaccount:argocd:")
    tags: [privilege-escalation, T1078.001]
