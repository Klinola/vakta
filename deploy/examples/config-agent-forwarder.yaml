agent:
  mode: host
  node_name: ""        # filled by k8s downward API (spec.nodeName)
  cluster_name: "prod" # identifies this cluster in alert labels
sources:
  ebpf: true
  auditd: true
  k8s_audit: false
forwarder:
  hub_url: "http://vakta-hub:7070"
  batch_size: 50
  flush_interval: 500ms
log:
  level: info
  format: json
