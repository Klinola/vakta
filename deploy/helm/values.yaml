image:
  repository: ghcr.io/vakta-project/vakta
  tag: "0.3.0"      # pin; do not use 'latest' in production
  pullPolicy: IfNotPresent

# User-supplied rules: each map entry becomes a file under /etc/vakta/rules/<key>.
# Built-in rules are always embedded in the binary; these are additive (user
# rules with the same id override built-in).
rules: {}
#  example.yaml: |
#    rules:
#      - id: exec-as-root
#        name: Exec as root
#        severity: high
#        event_type: EXEC
#        condition: event.uid == 0

# User-supplied action playbooks: each map entry → /etc/vakta/actions/<key>.
actions: {}
#  notify.yaml: |
#    actions:
#      - id: notify-only
#        name: Just notify
#        steps:
#          - id: s1
#            action: notify
#            params: {severity: high, message: "alert"}

mode: k8s
nodeSelector: {}
tolerations:
  - operator: Exists
    effect: NoSchedule

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

alertmanager: ""
loki: ""
auditLogPath: /var/log/audit/audit.log
k8sAuditLogPath: /var/log/kubernetes/audit.log

ui:
  service:
    type: ClusterIP
    port: 9090
