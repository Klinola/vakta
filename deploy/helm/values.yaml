image:
  repository: ghcr.io/vakta-project/vakta
  tag: latest
  pullPolicy: IfNotPresent

mode: k8s
nodeSelector: {}
tolerations:
  - operator: Exists
    effect: NoSchedule

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

alertmanager: ""
loki: ""
auditLogPath: /var/log/audit/audit.log
k8sAuditLogPath: /var/log/kubernetes/audit.log

ui:
  service:
    type: ClusterIP
    port: 9090
